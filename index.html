<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May (A)I Beautify Your Visualization?</title>
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/spinner.css">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script defer src="js/plot_utils.js"></script>
    <script defer src="js/metadata.js"></script>
    <script defer src="js/charts.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body>
        <!-- Spinner -->
        <div class="spinner" id="spinner">
            <div class="loader"></div>
        </div>
    <h1 style="text-align:center;margin-bottom:32px;">May (A)I Beautify Your Visualization?</h1>
    <p style="text-align:center;margin-top:-16px;margin-bottom:32px;color:#555;font-size:1rem;">Click on the legend to toggle items on/off</p>
    <div id="controls" style="display:flex;flex-direction:row;align-items:flex-end;margin-bottom:24px;gap:16px;justify-content:center;">
        <div>
            <label for="chart-type">Chart Type</label>
            <select id="chart-type">
                <option value="box">Box Plot</option>
                <option value="stacked">Stacked Bar Chart</option>
                <option value="line">Line Chart of Means</option>
                <option value="slope">Slope Chart (Human-AI)</option>
                <option value="swarm">Swarm Plot</option>
            </select>
        </div>
        <div>
            <label for="comparison-type">Comparison Type</label>
            <select id="comparison-type">
                <option value="summary" selected>Summary</option>
                <option value="human_ai">Human vs AI</option>
                <option value="role">Role</option>
                <option value="experience">Years of vis experience</option>
                <option value="frequency_vis">Frequency of visualization</option>
                <option value="frequency_public">Frequency of vis for public communication</option>
                <option value="domain">Domain</option>
                <option value="age">Age</option>
                <option value="tool_use">Would use an AI tool for beautification</option>
            </select>
        </div>
        <div>
            <label for="sort-by">Sort by</label>
            <select id="sort-by">
                <option value="mean">Mean</option>
                <option value="human_mean" selected>&#160;&#160;Human Mean</option>
                <option value="ai_mean">&#160;&#160;AI Mean</option>
                <option value="difference">&#160;&#160;Difference in Means (Human - AI)</option>
                <option value="median">Median</option>
                <option value="human_median">&#160;&#160;Human Median</option>
                <option value="ai_median">&#160;&#160;AI Median</option>
                <option value="difference_median">&#160;&#160;Difference in Medians (Human - AI)</option>
            </select>
        </div>
    </div>
    <div id="tab-bar" role="tablist" style="display:flex;justify-content:center;gap:12px;margin-bottom:18px;">
        <button id="tab-alterations-button" type="button" class="tab-button active" role="tab" aria-controls="tab-alterations" aria-selected="true">Alterations</button>
        <button id="tab-contexts-button" type="button" class="tab-button" role="tab" aria-controls="tab-contexts" aria-selected="false">Contexts</button>
    </div>
    <div id="tab-alterations" class="tab-panel active" role="tabpanel" aria-labelledby="tab-alterations-button">
        <div id="stacked-filter-controls-alterations" class="stacked-filter-controls" style="display:none;"></div>
        <div id="plots-container" style="display:flex;flex-direction:column;align-items:center;">
            <div id="human-plot" style="width:90vw;max-width:1200px;"></div>
            <div id="ai-plot" style="width:90vw;max-width:1200px;"></div>
        </div>
    </div>
    <div id="tab-contexts" class="tab-panel" role="tabpanel" aria-labelledby="tab-contexts-button">
        <div class="context-view-controls">
            <label for="context-view">View</label>
            <select id="context-view">
                <option value="use_cases" selected>Use Cases</option>
                <option value="importance">Importance of Factors</option>
            </select>
        </div>
        <div id="stacked-filter-controls-contexts" class="stacked-filter-controls" style="display:none;"></div>
        <div id="contexts-plots-container" style="display:flex;flex-direction:column;align-items:center;gap:24px;"></div>
    </div>
</body>
</html>
